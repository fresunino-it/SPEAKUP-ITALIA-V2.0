<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pagina non trovata — SpeakUp Italia</title>
<link rel="icon" href="assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0e0e12;color:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:440px}
.num{font-family:'Cormorant Garamond',serif;font-size:120px;font-style:italic;font-weight:600;color:#c9a84c;line-height:1;margin-bottom:12px;opacity:.85}
h1{font-size:24px;font-weight:600;margin-bottom:10px}
p{font-size:14px;color:rgba(245,240,232,.6);line-height:1.7;margin-bottom:28px}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;text-decoration:none;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.btn-g{background:linear-gradient(135deg,#009246,#00b359);color:#fff;box-shadow:0 8px 24px rgba(0,146,70,.35)}
.btn-o{background:rgba(255,255,255,.07);color:#f5f0e8;border:1px solid rgba(255,255,255,.12)}
.flag{margin-bottom:18px;font-size:48px}
</style>
</head>
<body>
<div class="wrap">
  <div class="flag">🇮🇹</div>
  <div class="num">404</div>
  <h1>Pagina non trovata</h1>
  <p>La pagina che stai cercando non esiste o è stata spostata.<br>Torna alla home e riprova!</p>
  <div class="btns">
    <a class="btn btn-g" href="index.html">← Torna alla Home</a>
    <a class="btn btn-o whatsapp-link" href="#">💬 Contattaci</a>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
